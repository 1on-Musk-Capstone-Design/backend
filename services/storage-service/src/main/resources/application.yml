server:
  address: 0.0.0.0  # 모든 네트워크 인터페이스에 바인딩 (외부 접속 허용)
  port: ${SERVER_PORT:8087}
  servlet:
    context-path: /api

spring:
  application:
    name: storage-service
  jwt:
    secret: ${SPRING_JWT_SECRET:local-dev-secret-please-change-this-is-a-very-long-secret-key-for-jwt-token-generation-minimum-32-characters}
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/capstone_db}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: admin

# WebSocket 설정은 WebSocketConfig에서 관리

# OpenAI API (PRD/프로토타입 LLM). 키는 환경변수 OPENAI_API_KEY 또는 ./local-application.yml 에만 두세요.
# 저장소에 API 키를 넣지 마세요.
openai:
  api-key: ${OPENAI_API_KEY:}
  model: text-embedding-ada-002
  max-tokens: 1000
  # 프로토타입 PRD/UI 생성용 채팅 모델 (유효한 API 키가 있을 때만 사용)
  prototype-model: ${OPENAI_PROTOTYPE_MODEL:gpt-4o-mini}
  # PRD: 최대 토큰(본문+보강+편집 패스) / 분량이 이보다 짧으면 확장 패스
  prototype-prd-max-tokens: ${OPENAI_PROTOTYPE_PRD_MAX_TOKENS:8192}
  prototype-prd-min-chars: ${OPENAI_PROTOTYPE_PRD_MIN_CHARS:4500}
  # 1) 입력이 일정 길이 이상이면 JSON 구조화 사전 요약(연관성·용어 정리)
  prototype-prd-brief-enabled: ${OPENAI_PROTOTYPE_PRD_BRIEF_ENABLED:true}
  prototype-prd-brief-min-content-chars: ${OPENAI_PROTOTYPE_PRD_BRIEF_MIN_CONTENT:180}
  # 2) 최종 편집 패스(사용자 스토리·DoD·엣지 등 실무 섹션 보강) — 권장 on
  prototype-prd-editor-pass-enabled: ${OPENAI_PROTOTYPE_PRD_EDITOR_PASS:true}

# Apple Sign In (AppleJwtValidator). 운영: APPLE_BUNDLE_ID 시크릿 / 로컬: 아래 기본값 또는 local-application.yml
apple:
  bundle-id: ${APPLE_BUNDLE_ID:com.capstone.local.dev}
  public-key-url: ${APPLE_PUBLIC_KEY_URL:https://appleid.apple.com/auth/keys}

# OAuth2 (Google) 로컬 기본값
oauth2:
  google:
    token-uri: https://oauth2.googleapis.com/token
    resource-uri: https://www.googleapis.com/oauth2/v2/userinfo
    login-uri: ${GOOGLE_LOGIN_URI:https://accounts.google.com/o/oauth2/v2/auth}
    web:
      client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
      client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/callback}
    ios:
      client-id: ${GOOGLE_IOS_CLIENT_ID:dummy-ios-client-id}
      client-secret: ${GOOGLE_IOS_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_IOS_REDIRECT_URI:dummy-ios-redirect-uri}
    # 배포 시 환경변수 GOOGLE_REDIRECT_URI로 설정 필요
    # 로컬: http://localhost:3000/auth/callback
    # 프로덕션1: https://mingjaam.github.io/auth/callback
    # 프로덕션2: https://on-it.kro.kr/auth/callback

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: false

logging:
  level:
    com.capstone: DEBUG
    org.springframework.security: INFO
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

workspace:
  invite:
    base-url: ${WORKSPACE_INVITE_BASE_URL:http://localhost:3000/invite}
    expire-hours: ${WORKSPACE_INVITE_EXPIRE_HOURS:168}

socketio:
  enabled: ${SOCKETIO_ENABLED:false}
  host: ${SOCKETIO_HOST:0.0.0.0}
  port: ${SOCKETIO_PORT:9092}
  allow-origin: ${SOCKETIO_ALLOW_ORIGIN:*}

app:
  allowed-origins:
    - ${APP_ALLOWED_ORIGINS_0:http://localhost:*}
    - ${APP_ALLOWED_ORIGINS_1:http://127.0.0.1:*}
    - ${APP_ALLOWED_ORIGINS_3:https://on-it.kro.kr}
  default-redirect-uri: ${APP_DEFAULT_REDIRECT_URI:http://localhost:3000/auth/callback}
  oauth-redirect-map:
    localhost: ${APP_OAUTH_REDIRECT_LOCALHOST:http://localhost:3000/auth/callback}
    127.0.0.1: ${APP_OAUTH_REDIRECT_LOOPBACK:http://localhost:3000/auth/callback}
    on-it.kro.kr: ${APP_OAUTH_REDIRECT_ONIT:https://on-it.kro.kr/auth/callback}
  # PRD 공유·웹알림용 프론트(SPA) 베이스 URL (백엔드 8080/api 가 아님). 운영은 실제 사이트 도메인.
  prd-public-base-url: ${APP_PRD_PUBLIC_BASE_URL:http://localhost:3000}
  # 로컬 디버깅용: true면 PRD/프로토타입 워크스페이스 권한 체크를 우회합니다. (운영에서는 반드시 false)
  local-dev-permit-all-workspace-access: ${APP_LOCAL_DEV_PERMIT_ALL_WORKSPACE_ACCESS:false}
  file:
    upload-dir: ${APP_FILE_UPLOAD_DIR:/var/lib/capstone/uploads}
    thumbnail-dir: ${APP_FILE_THUMBNAIL_DIR:/var/lib/capstone/uploads/thumbnails}
    base-url: ${APP_FILE_BASE_URL:http://localhost:8080/api}
  # 로컬 자동 로그인: POST /v1/auth/dev/bootstrap (프론트 Vite dev + localhost에서 호출)
  # 운영 배포 시 반드시 APP_DEV_BOOTSTRAP_AUTH=false
  dev-bootstrap-auth:
    enabled: ${APP_DEV_BOOTSTRAP_AUTH:false}

  # 아이디어 프로토타입 파이프라인 (선택). Vercel 토큰이 있으면 생성 파일 직접 배포
  prototype:
    # AI가 생성한 소스 보관( /uploads 외부 — 정적 공개되지 않음, API+JWT로만 조회)
    artifact-base-dir: ${APP_PROTOTYPE_ARTIFACT_DIR:/var/lib/capstone/prototype-artifacts}
    vercel-token: ${APP_PROTOTYPE_VERCEL_TOKEN:}
    vercel-team-id: ${APP_PROTOTYPE_VERCEL_TEAM_ID:}
    simulated-base-url: ${APP_PROTOTYPE_SIMULATED_BASE_URL:https://prototype.example.com}
